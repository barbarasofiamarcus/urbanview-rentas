<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Urban View · Gestión de Rentas</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
:root{--bg:#fff;--bg2:#f7f7f5;--bg3:#f0ede8;--text:#1a1a1a;--text2:#666;--text3:#999;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);--green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;--blue:#185FA5;--blue-light:#E6F1FB;--purple:#534AB7;--purple-light:#EEEDFE;--amber:#854F0B;--amber-light:#FAEEDA;--red:#993C1D;--red-light:#FAECE7;--radius:8px;--radius-lg:12px}
body{background:var(--bg3);color:var(--text);min-height:100vh}
.app{max-width:900px;margin:0 auto;background:var(--bg);min-height:100vh;box-shadow:0 0 0 0.5px var(--border)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:0.5px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50;gap:8px;flex-wrap:wrap}
.logo{font-size:15px;font-weight:600;letter-spacing:-.4px;white-space:nowrap}
.logo span{color:var(--green)}
.nav{display:flex;gap:3px;flex-wrap:wrap}
.nb{font-size:12px;padding:6px 10px;border-radius:var(--radius);border:0.5px solid transparent;background:transparent;cursor:pointer;color:var(--text2);transition:all .15s;white-space:nowrap}
.nb.active{background:var(--bg2);border-color:var(--border);color:var(--text);font-weight:500}
.nb:hover:not(.active){background:var(--bg2)}
.content{padding:18px}
.stitle{font-size:17px;font-weight:600;margin-bottom:14px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.met{background:var(--bg2);border-radius:var(--radius);padding:11px 13px}
.met-l{font-size:11px;color:var(--text2);margin-bottom:3px}
.met-v{font-size:19px;font-weight:600}
.met-s{font-size:10px;color:var(--text3);margin-top:2px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:13px 15px;margin-bottom:10px}
.ch{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:8px}
.cn{font-size:13px;font-weight:600}
.ct{font-size:14px;font-weight:600;text-align:right;flex-shrink:0}
.usd{color:var(--green-dark)}.ars{color:var(--blue)}.neg{color:#E24B4A}
.tag{font-size:10px;padding:2px 7px;border-radius:var(--radius);font-weight:500;display:inline-block}
.tg{background:var(--green-light);color:#3B6D11}
.tp{background:var(--amber-light);color:var(--amber)}
.te{background:var(--blue-light);color:var(--blue)}
.tk{background:var(--purple-light);color:var(--purple)}
.tc{background:var(--red-light);color:var(--red)}
.ta{background:#E1F5EE;color:#085041}
.pr{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-top:0.5px solid var(--border);font-size:12px;gap:4px}
.pn{color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pm{font-weight:500;min-width:72px;text-align:right;white-space:nowrap}
.chips{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.chip{font-size:10px;padding:2px 8px;border-radius:var(--radius);background:var(--bg2);color:var(--text2);border:0.5px solid var(--border)}
.mb{font-size:11px;padding:5px 10px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);transition:all .15s}
.mb:hover{background:var(--bg2)}
.mb.paid{background:var(--green-light);border-color:#9FE1CB;color:#3B6D11}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 9px;font-size:10px;font-weight:600;color:var(--text2);border-bottom:0.5px solid var(--border);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:7px 9px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
input,select,textarea{font-family:inherit;font-size:13px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);padding:7px 10px;color:var(--text);width:100%;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--green)}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:11px;color:var(--text2);font-weight:500}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fr3{grid-template-columns:1fr 1fr 1fr}
.fr1{grid-template-columns:1fr}
.btn-primary{background:var(--green);color:#fff;border:none;border-radius:var(--radius);padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer}
.btn-primary:hover{background:var(--green-dark)}
.btn-danger{background:var(--red-light);color:var(--red);border:0.5px solid #F5C4B3;border-radius:var(--radius);padding:5px 10px;font-size:11px;cursor:pointer}
.btn-danger:hover{background:#F5C4B3}
.notice{font-size:11px;padding:7px 11px;border-radius:var(--radius);background:var(--green-light);color:var(--green-dark);border:0.5px solid #9FE1CB;margin-bottom:13px}
.tbox{flex:1;min-width:110px;background:var(--bg2);border-radius:var(--radius);padding:10px 12px}
.tbl{font-size:10px;color:var(--text2);margin-bottom:3px;font-weight:500}
.tbv{font-size:15px;font-weight:600}
.rc{background:var(--bg2);border-radius:var(--radius);padding:10px 13px;border-left:3px solid var(--green)}
.rl{font-size:10px;font-weight:600;color:var(--text2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.rv{font-size:17px;font-weight:600}
.ab{font-size:12px;padding:6px 12px;border-radius:var(--radius);border:0.5px solid #9FE1CB;background:var(--green-light);color:var(--green-dark);cursor:pointer;font-weight:600}
.ab:hover{background:#9FE1CB}
.sr{display:flex;gap:6px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.ox{overflow-x:auto}
.mo-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:flex;align-items:flex-start;justify-content:center;padding-top:40px;z-index:200;overflow-y:auto}
.mo{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;width:90%;max-width:520px;margin-bottom:40px}
.mt{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.xb{background:none;border:none;cursor:pointer;color:var(--text2);font-size:20px;line-height:1}
.updated-badge{font-size:10px;padding:2px 8px;border-radius:var(--radius);background:var(--green-light);color:var(--green-dark);margin-left:8px;font-weight:500}
@media(max-width:600px){.nav .nb span{display:none}.fr3{grid-template-columns:1fr 1fr}.fr{grid-template-columns:1fr}}
</style>
</head>

</div>
<div class="content" id="ct"></div>
</div>

// Sync from Sheets on load
async function syncFromSheets(){
  try{
    const [rPag, rCar] = await Promise.all([
      fetch(SCRIPT_URL+'?hoja=Pagos&accion=getAll').then(r=>r.json()).catch(()=>({})),
      fetch(SCRIPT_URL+'?hoja=CargaMensual&accion=getAll').then(r=>r.json()).catch(()=>({}))
    ]);
    if(Object.keys(rPag).length>0){pag=rPag;localStorage.setItem('uv_pagos',JSON.stringify(pag));}
    if(Object.keys(rCar).length>0){
      // Parse JSON values back
      let carParsed={};
      Object.keys(rCar).forEach(k=>{
        try{carParsed[k]=JSON.parse(rCar[k]);}catch(e){carParsed[k]=rCar[k];}
      });
      car=carParsed;
      localStorage.setItem('uv_carga',JSON.stringify(car));
    }
    render();
  }catch(e){console.log('Sheets sync error:',e);}
}

async function saveToSheets(hoja, clave, valor){
  try{
    await fetch(SCRIPT_URL, {
      method:'POST',
      body: JSON.stringify({hoja, accion:'set', clave, valor}),
      headers:{'Content-Type':'text/plain'}
    });
  }catch(e){console.log('Sheets save error:',e);}
}

function save(sheetKey, sheetHoja){
  try{
    localStorage.setItem('uv_db',JSON.stringify(db));

}

function mk(m,y){return `${y}-${String(m+1).padStart(2,'0')}`}

function activo(u,m,y){
  if(!u.paga_renta||!u.monto_uf) return false;
  if(!u.inicio_pago||u.inicio_pago==='') return false;
  // Paga desde el mismo mes del inicio_pago
  const mesActual=y+'-'+String(m+1).padStart(2,'0');
  const mesInicio=u.inicio_pago.substring(0,7);
  return mesActual>=mesInicio;
}

function coch(u,m,y){
  if(!u.tiene_cochera||!u.monto_cochera) return false;
  if(!u.inicio_pago_cochera||u.inicio_pago_cochera==='') return false;
  const mesActual=y+'-'+String(m+1).padStart(2,'0');
  const mesInicio=u.inicio_pago_cochera.substring(0,7);
  return mesActual>=mesInicio;
}
function coch_OLD(u,m,y){
  if(!u.tiene_cochera||!u.monto_cochera) return false;
  if(!u.inicio_pago_cochera) return false;
  const ini=new Date(u.inicio_pago_cochera);
  return new Date(y,m,1)>=new Date(ini.getFullYear(),ini.getMonth(),1);
}

function calcUF(u,m,y){
  if(!activo(u,m,y)) return {items:[],totalUSD:0,totalARS:0};
  let items=[];
  let iva=u.iva_renta_usd&&u.moneda==='USD'?u.monto_uf*0.21:0;
  items.push({desc:`UF ${u.uf}`,monto:u.monto_uf+iva,moneda:u.moneda,iva:iva>0});
  if(coch(u,m,y)) items.push({desc:`Cochera UF ${u.uf}`,monto:u.monto_cochera,moneda:u.moneda_cochera,iva:false});
  return {
    items,
    totalUSD:items.filter(i=>i.moneda==='USD').reduce((s,i)=>s+i.monto,0),
    totalARS:items.filter(i=>i.moneda==='ARS').reduce((s,i)=>s+i.monto,0)
  };
}

function grupos(m,y){
  let g={};
  db.forEach(u=>{
    if(!activo(u,m,y)) return;
    let t=u.titular;
    if(!g[t]) g[t]={titular:t,tel:u.telefono,forma:u.forma_pago_renta,cbu:u.cbu_alias,tipo:u.tipo_propiedad,ufs:[],tUSD:0,tARS:0,pUV:u.pct_uv,pAl:u.pct_alejandro,pCo:u.pct_conrado};
    let r=calcUF(u,m,y);
    g[t].ufs.push({u,items:r.items,tUSD:r.totalUSD,tARS:r.totalARS});
    g[t].tUSD+=r.totalUSD;
    g[t].tARS+=r.totalARS;
  });
  return Object.values(g);
}

function pkey(t,m,y){return `${mk(m,y)}__${t}`}
function pst(t,m,y){return pag[pkey(t,m,y)]||'pendiente'}
function pset(t,m,y,v){
  const k=pkey(t,m,y);
  pag[k]=v;
  localStorage.setItem('uv_pagos',JSON.stringify(pag));
  saveToSheets('Pagos',k,v);
  render();
}

function go(id){

  document.querySelectorAll('.nb')[map[id]].classList.add('active');

function render(){
  const c=document.getElementById('ct');
  if(S.sc==='dashboard') c.innerHTML=rDashboard();
  else if(S.sc==='pagos') c.innerHTML=rPagos();
  else if(S.sc==='marcar') c.innerHTML=rMarcar();

function saveCar(){

function delUF(i){

function exportarExcel(){
  const gs=grupos(S.m,S.y);
  const ck=mk(S.m,S.y),cd=car[ck]||{ufs:{}};
  const fmtPago=(f)=>f==='efectivo_retira'?'Efectivo (retira)':f==='transferencia_monotributo_autonomo'?'Transf. monotributo':f==='transferencia_responsable_inscripto'?'Transf. resp. inscripto':f==='no_aplica'?'No aplica':f||'—';
  let totalIng=0,totalGas=0,totalNeto=0,totalUV=0,totalAl=0,totalCo=0;

  let csv='Titular,UFs,Tipo,Renta a pagar,Ingreso cobrado,Gastos,Neto,UV,Alejandro,Conrado,Forma de pago,Estado\n';
  gs.forEach(g=>{
    const st=pst(g.titular,S.m,S.y);
    const ufList=g.ufs.map(x=>`UF ${x.u.uf}`).join(' | ');
    let gIng=0,gGas=0,gNeto=0,gUV=0,gAl=0,gCo=0;
    g.ufs.forEach(({u})=>{
      const d=(cd.ufs||{})[u.uf]||{};
      const i2=parseFloat(d.ingreso||0),g2=parseFloat(d.gastos||0);
      const alq=(u.tipo_propiedad==='externo'||u.tipo_propiedad==='conrado')?u.monto_uf:0;
      const neto=i2-alq-g2,uv=neto>0?neto*u.pct_uv/100:0,n2=neto-uv;
      gIng+=i2;gGas+=g2;gNeto+=neto;
      if(i2>0){gUV+=uv;gAl+=n2*u.pct_alejandro/100;gCo+=n2*u.pct_conrado/100;}
    });
    totalIng+=gIng;totalGas+=gGas;totalNeto+=gNeto;totalUV+=gUV;totalAl+=gAl;totalCo+=gCo;
    csv+=`"${g.titular}","${ufList}","${g.tipo}",${Math.round(g.tUSD)},${Math.round(gIng)},${Math.round(gGas)},${Math.round(gNeto)},${Math.round(gUV)},${Math.round(gAl)},${Math.round(gCo)},"${fmtPago(g.forma)}","${st==='pagado'?'Pagado':'Pendiente'}"\n`;
  });
  csv+='\n';
  csv+=`"TOTALES",,,,${Math.round(totalIng)},${Math.round(totalGas)},${Math.round(totalNeto)},${Math.round(totalUV)},${Math.round(totalAl)},${Math.round(totalCo)},,\n`;
  if(cd.notas) csv+=`\n"Notas","${cd.notas}"\n`;
  const BOM='\uFEFF';
  const blob=new Blob([BOM+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`UrbanView_${MES[S.m]}_${S.y}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function setCargaUF(uid, campo, valor){

  if(!car[ck].ufs) car[ck].ufs={};
  if(!car[ck].ufs[uid]) car[ck].ufs[uid]={};
  car[ck].ufs[uid][campo]=valor;
  localStorage.setItem('uv_carga',JSON.stringify(car));
  clearTimeout(_cargaTimer);
  _cargaTimer=setTimeout(()=>{
    // Guardar cada UF como clave simple igual que pagos
    const ck2=mk(S.m,S.y);
    const cd=car[ck2]||{ufs:{}};
    const gs2=grupos(S.m,S.y);
    gs2.forEach(g=>g.ufs.forEach(({u})=>{
      const d=(cd.ufs||{})[u.uf]||{};
      const ing=parseFloat(d.ingreso||0);
      if(ing===0) return;
      const gas=parseFloat(d.gastos||0);
      const alq=(u.tipo_propiedad==='externo'||u.tipo_propiedad==='conrado')?u.monto_uf:0;
      const neto=ing-alq-gas;
      const uv=neto>0?Math.round(neto*u.pct_uv/100):0;
      const neto2=neto-uv;
      const al=Math.round(neto2*u.pct_alejandro/100);
      const co=Math.round(neto2*u.pct_conrado/100);
      const clave=ck2+'-UF'+u.uf;
      const valor='Ingreso: '+ing+' | Gastos: '+gas+' | Neto: '+Math.round(neto)+' | UV: '+uv+' | Alejandro: '+al+' | Conrado: '+co;
      saveToSheets('CargaMensual', clave, valor);
    }));
  },1500);
}

function setCargaNotas(v){
  const ck=mk(S.m,S.y);
  if(!car[ck]) car[ck]={ufs:{},notas:''};
  car[ck].notas=v;
  localStorage.setItem('uv_carga',JSON.stringify(car));
  saveToSheets('CargaMensual', ck+'-notas', v);
}

render();
syncFromSheets();
</script>
